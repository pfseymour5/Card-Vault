// ─── Anthropic search loop (used only for price lookup) ───────────────────────
async function claudeWithSearch(userPrompt, systemPrompt) {
  const messages = [{ role: "user", content: userPrompt }];
  const tools    = [{ type: "web_search_20250305", name: "web_search" }];
  for (let i = 0; i < 8; i++) {
    const body = { model: "claude-sonnet-4-20250514", max_tokens: 4096, tools, messages };
    if (systemPrompt) body.system = systemPrompt;
    if (!ANTHROPIC_API_KEY) throw new Error("Add your Anthropic API key to card-vault.html to enable AI Price Lookup.");
    const res  = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": ANTHROPIC_API_KEY,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || "API error");
    messages.push({ role: "assistant", content: data.content });
    if (data.stop_reason === "end_turn")
      return data.content.filter(b => b.type === "text").map(b => b.text).join("");
    if (data.stop_reason === "tool_use") {
      const results = data.content.filter(b => b.type === "tool_use")
        .map(b => ({ type: "tool_result", tool_use_id: b.id, content: "No results. Answer from your own knowledge." }));
      messages.push({ role: "user", content: results });
    } else break;
  }
  throw new Error("No final response from AI");
}

function parseJSON(text) {
  const s = text.trim();
  try { return JSON.parse(s); } catch {}
  let t = s;
  const fb = "```json", fe = "```";
  if (t.startsWith(fb)) t = t.slice(fb.length);
  else if (t.startsWith(fe)) t = t.slice(fe.length);
  if (t.endsWith(fe)) t = t.slice(0, t.length - fe.length);
  t = t.trim();
  try { return JSON.parse(t); } catch {}
  const m = t.match(/\{[\s\S]*\}/);
  if (m) { try { return JSON.parse(m[0]); } catch {} }
  return null;
}

async function fetchCardPricing(card) {
  const q = [card.player, card.year, card.set, card.variation,
    card.cardNumber ? "#" + card.cardNumber : "",
    card.gradingOrg !== "Raw" ? card.gradingOrg + " " + card.grade : ""].filter(Boolean).join(" ");
  const system = "You are a card pricing expert. Search eBay sold listings. After searching respond with ONLY a JSON object.";
  const prompt = `Search recent eBay sold prices for: "${q}"\nRespond with ONLY this JSON:\n{"cardName":"","summary":"","prices":[{"grade":"","value":0,"source":""}],"lastSale":{"price":0,"date":"","platform":""},"trend":"stable","confidence":"medium"}`;
  const text   = await claudeWithSearch(prompt, system);
  const result = parseJSON(text);
  if (!result) throw new Error("Could not parse pricing data");
  return result;
}

{onClose && <button onClick={onClose} style={{ background: “none”, border: “none”, color: “#555”, cursor: “pointer”, fontSize: “1rem” }}>✕</button>}

<div style={{ background: “#13131a”, borderRadius: “8px”, padding: “0.6rem 0.9rem”, marginBottom: “1rem” }}>

{[card.year, card.set, card.variation, card.cardNumber ? “#” + card.cardNumber : “”, card.gradingOrg !== “Raw” ? card.gradingOrg + “ “ + card.grade : “”].filter(Boolean).join(” · “)}
</div>
</div>
{status === “loading” && <div style={{ display: “flex”, flexDirection: “column”, alignItems: “center”, gap: “0.75rem”, padding: “1.5rem 0” }}><Spinner size={28} /><div style={{ color: “#666”, fontSize: “0.8rem” }}>Searching recent sold listings…</div></div>}

{status === “done” && result && (
<div>
<p style={{ color: “#ccc”, fontSize: “0.82rem”, lineHeight: 1.5, margin: “0 0 0.6rem” }}>{result.summary}</p>
<div style={{ display: “flex”, gap: “0.75rem”, flexWrap: “wrap”, marginBottom: “1rem” }}>
{result.trend      && <span style={{ color: trendColor, fontSize: “0.72rem”, fontWeight: “700” }}>{trendIcon} {result.trend.toUpperCase()}</span>}
{result.confidence && <span style={{ color: confColor,  fontSize: “0.72rem” }}>{result.confidence} confidence</span>}
{result.lastSale   && <span style={{ color: “#555”,     fontSize: “0.72rem” }}>Last: {fmtUSD(result.lastSale.price)} via {result.lastSale.platform}</span>}
</div>
{result.prices?.length > 0 && (
<div style={{ display: “flex”, flexDirection: “column”, gap: “0.4rem”, marginBottom: “1rem” }}>
{result.prices.map((p, i) => (
<div key={i} style={{ display: “flex”, alignItems: “center”, justifyContent: “space-between”, background: applied === p.value ? “#1a2a1a” : “#13131a”, border: “1px solid “ + (applied === p.value ? “#4ade8055” : “#1e1e2e”), borderRadius: “8px”, padding: “0.55rem 0.85rem” }}>
<div>
<span style={{ color: “#f0f0f5”, fontSize: “0.85rem”, fontWeight: “600” }}>{fmtUSD(p.value)}</span>
<span style={{ color: “#555”, fontSize: “0.72rem”, marginLeft: “0.5rem” }}>{p.grade}</span>
{p.source && <span style={{ color: “#444”, fontSize: “0.68rem”, marginLeft: “0.35rem” }}>· {p.source}</span>}

<button onClick={() => { onApplyValue(p.value); setApplied(p.value); }}

            {filtered.map(card => <CardRow key={card.id} card={card} onEdit={setEditCard} onDelete={deleteCard} onLookup={setLookupCard} />)}
          </>
        )}
        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: "4rem 2rem", color: "#444" }}>
            <div style={{ fontSize: "2rem", marginBottom: "0.75rem" }}>🔍</div>
            <div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: "1.3rem", letterSpacing: "0.1em" }}>{search || catFilter ? "NO MATCHING CARDS" : "NO CARDS YET"}</div>
            {!search && !catFilter && <div style={{ fontSize: "0.85rem", marginTop: "0.4rem" }}>Click "+ Add Card" to get started.</div>}
          </div>
        )}
      </div>
    )}
  </div>

  {showForm   && <Modal onClose={() => setShowForm(false)}  wide><CardForm onSave={addCard}   onCancel={() => setShowForm(false)}  /></Modal>}
  {editCard   && <Modal onClose={() => setEditCard(null)}   wide><CardForm initial={editCard} onSave={updateCard} onCancel={() => setEditCard(null)} /></Modal>}
  {lookupCard && <PriceLookupModal card={lookupCard} onApplyValue={applyPrice} onClose={() => setLookupCard(null)} />}
</div>
```

);
}
